# Example 1 — Task Manager API agents
# Usage: marksync orchestrate -c examples/1/agents.yml

agents:
  editor-1:
    role: editor
    auto_edit: true

  reviewer-1:
    role: reviewer

  deployer-1:
    role: deployer

  monitor-1:
    role: monitor

pipelines:
  review-flow:
    stages: [editor-1, reviewer-1]
  deploy-flow:
    stages: [editor-1, reviewer-1, deployer-1]

routes:
  - pattern: "markpact:file=*"
    agent: editor-1
  - pattern: "markpact:deps"
    agent: reviewer-1
  - pattern: "markpact:run"
    agent: deployer-1
