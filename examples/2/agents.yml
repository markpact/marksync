# Example 2 — Chat WebSocket App agents
# Usage: marksync orchestrate -c examples/2/agents.yml

agents:
  editor-1:
    role: editor
    auto_edit: true

  reviewer-1:
    role: reviewer

  monitor-1:
    role: monitor

pipelines:
  review-flow:
    stages: [editor-1, reviewer-1]

routes:
  - pattern: "markpact:file=*"
    agent: editor-1
  - pattern: "markpact:deps"
    agent: reviewer-1
