# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  marksync Docker Compose — Simplified Agent Orchestration                ║
# ╠══════════════════════════════════════════════════════════════════════════════╣
# ║                                                                            ║
# ║  Prerequisites:                                                            ║
# ║    - Ollama running LOCALLY on the host (not in Docker Compose)            ║
# ║    - Pull a model: ollama pull qwen2.5-coder:7b                            ║
# ║                                                                            ║
# ║  Architecture:                                                             ║
# ║                                                                            ║
# ║    agents.yml ─────► orchestrator ──┬──► editor-1                          ║
# ║    (define once)     (1 container)  ├──► reviewer-1                        ║
# ║                                     ├──► deployer-1                        ║
# ║                                     └──► monitor-1                         ║
# ║                           │                                                ║
# ║                    sync-server (ws://8765)                                 ║
# ║                           │                                                ║
# ║                    api-server (http://8080)                                ║
# ║                           │                                                ║
# ║                   /project/README.md                                       ║
# ║                                                                            ║
# ║  Host: Ollama (http://host.docker.internal:11434)                          ║
# ║                                                                            ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: marksync

services:

  # ─── SYNC SERVER ──────────────────────────────────────────────────────────
  sync-server:
    build: .
    container_name: marksync-server
    command: ["server", "${PROJECT_README:-README.md}", "--port", "${MARKSYNC_PORT:-8765}"]
    ports:
      - "${MARKSYNC_PORT:-8765}:${MARKSYNC_PORT:-8765}"
    volumes:
      - project-data:/project
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c",
        "import asyncio,websockets; asyncio.run(websockets.connect('ws://localhost:${MARKSYNC_PORT:-8765}').__aenter__())"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # ─── ORCHESTRATOR — all agents in 1 container from agents.yml ─────────
  orchestrator:
    build: .
    container_name: marksync-orchestrator
    command: >
      orchestrate --config agents.yml
      --server-uri ${MARKSYNC_SERVER_DOCKER:-ws://sync-server:8765}
      --ollama-url ${OLLAMA_URL_DOCKER:-http://host.docker.internal:11434}
      --model ${OLLAMA_MODEL:-qwen2.5-coder:7b}
    depends_on:
      sync-server:
        condition: service_healthy
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - MARKSYNC_SERVER=${MARKSYNC_SERVER_DOCKER:-ws://sync-server:8765}
      - OLLAMA_URL=${OLLAMA_URL_DOCKER:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5-coder:7b}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ─── DSL API SERVER ───────────────────────────────────────────────────────
  api-server:
    build: .
    container_name: marksync-api
    command: >
      api --host 0.0.0.0 --port ${MARKSYNC_API_PORT:-8080}
      --server-uri ${MARKSYNC_SERVER_DOCKER:-ws://sync-server:8765}
      --ollama-url ${OLLAMA_URL_DOCKER:-http://host.docker.internal:11434}
    ports:
      - "${MARKSYNC_API_PORT:-8080}:${MARKSYNC_API_PORT:-8080}"
    depends_on:
      sync-server:
        condition: service_healthy
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - MARKSYNC_SERVER=${MARKSYNC_SERVER_DOCKER:-ws://sync-server:8765}
      - OLLAMA_URL=${OLLAMA_URL_DOCKER:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ─── INIT: Seeds the shared volume with example README ───────────────────
  init-project:
    build: .
    container_name: marksync-init
    entrypoint: ["sh", "-c"]
    command:
      - |
        if [ ! -f /project/README.md ]; then
          echo "Seeding project with example README.md..."
          cp /app/examples/1/README.md /project/README.md
          echo "Done."
        else
          echo "README.md already exists, skipping seed."
        fi
    volumes:
      - project-data:/project
    restart: "no"

volumes:
  project-data:
    driver: local
