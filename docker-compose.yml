# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  marksync Docker Compose — Multi-Agent Markpact Collaboration Ecosystem   ║
# ╠══════════════════════════════════════════════════════════════════════════════╣
# ║                                                                            ║
# ║  Prerequisites:                                                            ║
# ║    - Ollama running LOCALLY on the host (not in Docker Compose)            ║
# ║    - Pull a model: ollama pull qwen2.5-coder:7b                            ║
# ║                                                                            ║
# ║  Architecture:                                                             ║
# ║                                                                            ║
# ║  ┌─────────────┐     ┌──────────────┐     ┌──────────────┐                ║
# ║  │ sync-server  │◄───►│ agent-editor  │     │ agent-deploy │                ║
# ║  │ (WebSocket)  │◄───►│ (LLM edits)  │     │ (markpact)   │                ║
# ║  │ port 8765    │◄───►│              │     │              │                ║
# ║  └──────┬───────┘     └──────────────┘     └──────────────┘                ║
# ║         │              ┌──────────────┐     ┌──────────────┐               ║
# ║         ├─────────────►│agent-reviewer │     │ agent-monitor│               ║
# ║         │              │ (code review) │     │ (log changes)│               ║
# ║         │              └──────────────┘     └──────────────┘               ║
# ║         │                                                                  ║
# ║    /project (shared volume)                                                ║
# ║    └── README.md  ← single source of truth                                ║
# ║                                                                            ║
# ║  Host:                                                                     ║
# ║    Ollama (http://host.docker.internal:11434)                              ║
# ║                                                                            ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: marksync

services:

  # ─── SYNC SERVER ──────────────────────────────────────────────────────────
  sync-server:
    build: .
    container_name: marksync-server
    command: ["server", "${PROJECT_README:-README.md}", "--port", "${MARKSYNC_PORT:-8765}"]
    ports:
      - "${MARKSYNC_PORT:-8765}:${MARKSYNC_PORT:-8765}"
    volumes:
      - project-data:/project
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c",
        "import asyncio,websockets; asyncio.run(websockets.connect('ws://localhost:${MARKSYNC_PORT:-8765}').__aenter__())"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # ─── DSL API SERVER ─────────────────────────────────────────────────────
  api-server:
    build: .
    container_name: marksync-api
    command: >
      api --host 0.0.0.0 --port ${MARKSYNC_API_PORT:-8080}
      --server-uri ${MARKSYNC_SERVER_DOCKER:-ws://sync-server:8765}
      --ollama-url ${OLLAMA_URL_DOCKER:-http://host.docker.internal:11434}
    ports:
      - "${MARKSYNC_API_PORT:-8080}:${MARKSYNC_API_PORT:-8080}"
    depends_on:
      sync-server:
        condition: service_healthy
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - MARKSYNC_SERVER=${MARKSYNC_SERVER_DOCKER:-ws://sync-server:8765}
      - OLLAMA_URL=${OLLAMA_URL_DOCKER:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ─── AGENT: EDITOR (LLM-powered code improvements) ───────────────────────
  agent-editor:
    build: .
    container_name: marksync-agent-editor
    command: >
      agent --role editor --name "editor-1"
      --server-uri ${MARKSYNC_SERVER_DOCKER:-ws://sync-server:8765}
      --ollama-url ${OLLAMA_URL_DOCKER:-http://host.docker.internal:11434}
      --model ${OLLAMA_MODEL:-qwen2.5-coder:7b}
    depends_on:
      sync-server:
        condition: service_healthy
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - MARKSYNC_SERVER=${MARKSYNC_SERVER_DOCKER:-ws://sync-server:8765}
      - OLLAMA_URL=${OLLAMA_URL_DOCKER:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5-coder:7b}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ─── AGENT: REVIEWER (code quality analysis) ─────────────────────────────
  agent-reviewer:
    build: .
    container_name: marksync-agent-reviewer
    command: >
      agent --role reviewer --name "reviewer-1"
      --server-uri ${MARKSYNC_SERVER_DOCKER:-ws://sync-server:8765}
      --ollama-url ${OLLAMA_URL_DOCKER:-http://host.docker.internal:11434}
      --model ${OLLAMA_MODEL:-qwen2.5-coder:7b}
    depends_on:
      sync-server:
        condition: service_healthy
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ─── AGENT: DEPLOYER (triggers markpact build) ───────────────────────────
  agent-deployer:
    build: .
    container_name: marksync-agent-deployer
    command: >
      agent --role deployer --name "deployer-1"
      --server-uri ${MARKSYNC_SERVER_DOCKER:-ws://sync-server:8765}
      --ollama-url ${OLLAMA_URL_DOCKER:-http://host.docker.internal:11434}
    depends_on:
      sync-server:
        condition: service_healthy
    volumes:
      - project-data:/project
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ─── AGENT: MONITOR (logs all changes with stats) ────────────────────────
  agent-monitor:
    build: .
    container_name: marksync-agent-monitor
    command: >
      agent --role monitor --name "monitor-1"
      --server-uri ${MARKSYNC_SERVER_DOCKER:-ws://sync-server:8765}
      --ollama-url ${OLLAMA_URL_DOCKER:-http://host.docker.internal:11434}
    depends_on:
      sync-server:
        condition: service_healthy
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ─── INIT: Seeds the shared volume with example README ───────────────────
  init-project:
    build: .
    container_name: marksync-init
    entrypoint: ["sh", "-c"]
    command:
      - |
        if [ ! -f /project/README.md ]; then
          echo "Seeding project with example README.md..."
          cp /app/examples/1/README.md /project/README.md
          echo "Done."
        else
          echo "README.md already exists, skipping seed."
        fi
    volumes:
      - project-data:/project
    restart: "no"

volumes:
  project-data:
    driver: local
