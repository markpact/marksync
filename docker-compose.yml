# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  marksync Docker Compose — Multi-Agent Markpact Collaboration Ecosystem   ║
# ╠══════════════════════════════════════════════════════════════════════════════╣
# ║                                                                            ║
# ║  Prerequisites:                                                            ║
# ║    - Ollama running LOCALLY on the host (not in Docker Compose)            ║
# ║    - Pull a model: ollama pull qwen2.5-coder:7b                            ║
# ║                                                                            ║
# ║  Architecture:                                                             ║
# ║                                                                            ║
# ║  ┌─────────────┐     ┌──────────────┐     ┌──────────────┐                ║
# ║  │ sync-server  │◄───►│ agent-editor  │     │ agent-deploy │                ║
# ║  │ (WebSocket)  │◄───►│ (LLM edits)  │     │ (markpact)   │                ║
# ║  │ port 8765    │◄───►│              │     │              │                ║
# ║  └──────┬───────┘     └──────────────┘     └──────────────┘                ║
# ║         │              ┌──────────────┐     ┌──────────────┐               ║
# ║         ├─────────────►│agent-reviewer │     │ agent-monitor│               ║
# ║         │              │ (code review) │     │ (log changes)│               ║
# ║         │              └──────────────┘     └──────────────┘               ║
# ║         │                                                                  ║
# ║    /project (shared volume)                                                ║
# ║    └── README.md  ← single source of truth                                ║
# ║                                                                            ║
# ║  Host:                                                                     ║
# ║    Ollama (http://host.docker.internal:11434)                              ║
# ║                                                                            ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: marksync

services:

  # ─── SYNC SERVER ──────────────────────────────────────────────────────────
  sync-server:
    build: .
    container_name: marksync-server
    command: ["server", "README.md", "--port", "8765"]
    ports:
      - "8765:8765"
    volumes:
      - project-data:/project
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c",
        "import asyncio,websockets; asyncio.run(websockets.connect('ws://localhost:8765').__aenter__())"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # ─── AGENT: EDITOR (LLM-powered code improvements) ───────────────────────
  agent-editor:
    build: .
    container_name: marksync-agent-editor
    command: >
      agent --role editor --name "editor-1"
      --server-uri ws://sync-server:8765
      --ollama-url http://host.docker.internal:11434
      --model qwen2.5-coder:7b
    depends_on:
      sync-server:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - MARKSYNC_SERVER=ws://sync-server:8765
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen2.5-coder:7b
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ─── AGENT: REVIEWER (code quality analysis) ─────────────────────────────
  agent-reviewer:
    build: .
    container_name: marksync-agent-reviewer
    command: >
      agent --role reviewer --name "reviewer-1"
      --server-uri ws://sync-server:8765
      --ollama-url http://host.docker.internal:11434
      --model qwen2.5-coder:7b
    depends_on:
      sync-server:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ─── AGENT: DEPLOYER (triggers markpact build) ───────────────────────────
  agent-deployer:
    build: .
    container_name: marksync-agent-deployer
    command: >
      agent --role deployer --name "deployer-1"
      --server-uri ws://sync-server:8765
      --ollama-url http://host.docker.internal:11434
    depends_on:
      sync-server:
        condition: service_healthy
    volumes:
      - project-data:/project
    environment:
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ─── AGENT: MONITOR (logs all changes with stats) ────────────────────────
  agent-monitor:
    build: .
    container_name: marksync-agent-monitor
    command: >
      agent --role monitor --name "monitor-1"
      --server-uri ws://sync-server:8765
      --ollama-url http://host.docker.internal:11434
    depends_on:
      sync-server:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ─── INIT: Seeds the shared volume with example README ───────────────────
  init-project:
    build: .
    container_name: marksync-init
    entrypoint: ["sh", "-c"]
    command:
      - |
        if [ ! -f /project/README.md ]; then
          echo "Seeding project with example README.md..."
          cp /app/examples/demo-project.md /project/README.md
          echo "Done."
        else
          echo "README.md already exists, skipping seed."
        fi
    volumes:
      - project-data:/project
    restart: "no"

volumes:
  project-data:
    driver: local
